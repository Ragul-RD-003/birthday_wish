<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0626">
  <meta name="description" content="Happy Birthday Nithya ✨">

  <!-- Prevent iOS font inflation -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Happy Birthday Nithya ✨</title>

  <!-- Fonts: preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LAYER 0: Background canvas ── -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ── LAYER 10: Main page content ── -->
  <main id="page" role="main">

    <!-- Top ornamental rule -->
    <div class="rule rule-top" aria-hidden="true"></div>

    <!-- Sub-tagline -->
    <p class="tagline" aria-hidden="true">✦ &nbsp; A Special Celebration &nbsp; ✦</p>

    <!-- ══ HERO TEXT BLOCK ══
         overflow:visible on all ancestors — no clipping -->
    <div class="hero-block">
      <span class="hb-line" aria-label="Happy Birthday">Happy&nbsp;Birthday</span>
      <!-- NITHYA: fluid font-size, padding ensures glow never clips -->
      <span class="name-line" aria-label="Nithya">Nithya</span>
    </div>

    <!-- ══ QUOTE CARD ══ -->
    <article class="quote-card" aria-label="Birthday wish">
      <span class="quote-mark" aria-hidden="true">"</span>
      <p class="quote-text">
        May your life be filled with happiness, peace,<br>
        success, and endless beautiful memories.<br>
        Happy Birthday.
      </p>
    </article>

    <!-- ══ CRYSTAL HEART VISUALIZER ══
         SVG injected by script.js inside .heart-wrap -->
    <section class="heart-section" aria-label="Music visualizer">
      <div class="heart-wrap">
        <!-- Ambient halo rings -->
        <div class="halo halo-1" aria-hidden="true"></div>
        <div class="halo halo-2" aria-hidden="true"></div>
        <!-- SVG heart built by script.js -->
        <!-- Music notes container — positioned BELOW heart, floats UP -->
        <div class="notes-container" aria-hidden="true"></div>
      </div>
    </section>

    <!-- Bottom ornamental rule -->
    <div class="rule footer-rule rule-bottom" aria-hidden="true"></div>

  </main>

  <!-- ── AUDIO ENGINE ──
       - src: assets/song.mp3
       - loop: yes
       - preload: auto (fetch early for smoother start)
       - No controls rendered (visibility handled by JS)
  -->
  <audio
    id="bg-audio"
    src="assets/song.mp3"
    loop
    preload="auto"
    aria-hidden="true"
  ></audio>

  <script src="script.js"></script>
</body>
</html>
