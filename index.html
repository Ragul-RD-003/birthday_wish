<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >
    <meta name="theme-color" content="#ffb6d9">

    <title>Happy Birthday NITHYA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Effects -->
    <div class="background-container">

        <div class="gradient-layer"></div>

        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>

        <div id="stars"></div>
        <div id="sparkles"></div>
        <div id="petals"></div>

    </div>

    <!-- Main Content -->
    <main class="main-container">

        <!-- Hero Section -->
        <section class="hero-section">

            <div class="birthday-text-wrapper">

                <h1 id="birthdayTitle" class="birthday-title">
                    Happy Birthday
                </h1>

                <h2 id="nameTitle" class="name-title">
                    NITHYA
                </h2>

                <div class="name-glow"></div>

            </div>

            <p class="birthday-quote">
                “May your life be filled with happiness, peace, success,
                and endless beautiful memories. Happy Birthday.”
            </p>

        </section>

        <!-- Music Visualizer -->
        <section class="music-section">

            <div class="music-core-container">

                <div class="heart-glow-ring ring-1"></div>
                <div class="heart-glow-ring ring-2"></div>
                <div class="heart-glow-ring ring-3"></div>

                <div id="crystalHeart" class="crystal-heart">
                    ❤
                </div>

                <div id="musicNotes"></div>

            </div>

        </section>

    </main>

    <!-- Audio -->
    <audio
        id="birthdaySong"
        preload="auto"
        loop controls>
        <source src="assets/song.mp3" type="audio/mpeg">
    </audio>

    <!-- Optional autoplay helper -->
    <div id="tapOverlay" class="tap-overlay hidden">
        <div class="tap-card">
            <h3>Tap Anywhere</h3>
            <p>to begin the birthday surprise ✨</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
